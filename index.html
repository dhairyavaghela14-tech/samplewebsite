<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Amazon Clone</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #eaeded;
        }

        /* Navbar */
        .navbar {
            background-color: #131921;
            color: white;
            display: flex;
            align-items: center;
            padding: 10px 20px;
            justify-content: space-between;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #ff9900;
        }

        .search-bar {
            flex: 1;
            margin: 0 20px;
            display: flex;
        }

        .search-bar input {
            width: 100%;
            padding: 8px;
            border: none;
        }

        .search-bar button {
            padding: 8px 15px;
            background-color: #febd69;
            border: none;
            cursor: pointer;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        /* Hero Section */
        .hero {
            background: url("https://via.placeholder.com/1500x400") no-repeat center;
            background-size: cover;
            height: 300px;
        }

        /* Product Section */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .product-card {
            background: white;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .product-card button {
            margin-top: 10px;
            padding: 8px 12px;
            background-color: #ffd814;
            border: 1px solid #fcd200;
            cursor: pointer;
        }

        /* Footer */
        .footer {
            background-color: #232f3e;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">amazon</div>

        <div class="search-bar">
            <input type="text" placeholder="Search products...">
            <button>Search</button>
        </div>

        <div class="nav-links">
            <div>Account</div>
            <div>Orders</div>
            <div>Cart 🛒</div>
        </div>
    </div>

    <!-- Hero Banner -->
    <div class="hero"></div>

    <!-- Products -->
    <div class="products">
        <div class="product-card">
            <img src="https://via.placeholder.com/200" alt="Product">
            <h3>Product 1</h3>
            <p>$29.99</p>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/200" alt="Product">
            <h3>Product 2</h3>
            <p>$49.99</p>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/200" alt="Product">
            <h3>Product 3</h3>
            <p>$19.99</p>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/200" alt="Product">
            <h3>Product 4</h3>
            <p>$99.99</p>
            <button>Add to Cart</button>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>© 2026 Amazon Clone | For Educational Purposes Only</p>
    </div>

</body>
</html>
